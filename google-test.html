<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google OAuth Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
    }
    h1 { margin-bottom: 8px; }
    p { color: #555; margin-bottom: 24px; }
    #token-section { display: none; margin-top: 24px; }
    #token-box {
      width: 100%;
      height: 120px;
      font-size: 12px;
      font-family: monospace;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    #copy-btn {
      margin-top: 8px;
      padding: 8px 16px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    #copy-btn:hover { background: #1558b0; }
    #copy-msg { margin-left: 10px; color: green; font-size: 14px; display: none; }
    .label { font-weight: bold; margin-bottom: 6px; display: block; }
  </style>
</head>
<body>
  <h1>Google OAuth — ID Token Tester</h1>
  <p>Click the button below to sign in with Google. The ID token will appear so you can copy it and use it in Postman to test <code>POST /auth/google</code>.</p>

  <!-- Google Identity Services button renders here -->
  <div id="g_id_onload"
    data-client_id="442101961537-m8arik773ncipopbjs7b7l99ok61ugd9.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
    data-type="standard"
    data-size="large"
    data-theme="outline"
    data-text="sign_in_with"
    data-shape="rectangular"
    data-logo_alignment="left">
  </div>

  <div id="token-section">
    <span class="label">Your ID Token (copy and use as <code>idToken</code> in Postman):</span>
    <textarea id="token-box" readonly></textarea>
    <br />
    <button id="copy-btn" onclick="copyToken()">Copy Token</button>
    <span id="copy-msg">Copied!</span>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    function handleCredentialResponse(response) {
      const idToken = response.credential;
      document.getElementById('token-box').value = idToken;
      document.getElementById('token-section').style.display = 'block';
    }

    function copyToken() {
      const box = document.getElementById('token-box');
      box.select();
      box.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(box.value).then(() => {
        const msg = document.getElementById('copy-msg');
        msg.style.display = 'inline';
        setTimeout(() => { msg.style.display = 'none'; }, 2000);
      });
    }
  </script>
</body>
</html>
